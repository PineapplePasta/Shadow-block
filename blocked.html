<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow System - Realm Sealed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Rajdhani", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #030308;
        background-image: radial-gradient(circle at center, #110e1c 0%, #030308 100%);
        color: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 600px;
        text-align: center;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .character {
        width: 150px;
        height: 150px;
        margin: 0 auto 30px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 80px;
        animation: float 3s ease-in-out infinite;
        overflow: hidden;
        position: relative;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        animation: float 3s ease-in-out infinite, whiteGlow 2s ease-in-out infinite;
      }

      .character::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(167, 139, 250, 0.6) 0%, rgba(167, 139, 250, 0) 70%);
        animation: purpleGlow 2s ease-in-out infinite;
        z-index: 0;
      }

      .character::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('assets/statue_grin.png');
        background-size: cover;
        background-position: center top;
        background-repeat: no-repeat;
        z-index: 1;
      }

      @keyframes purpleGlow {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }

      @keyframes whiteGlow {
        0%, 100% {
          box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        50% {
          box-shadow: 0 0 40px rgba(255, 255, 255, 0.6);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      h1 {
        font-family: "Cinzel Decorative", serif;
        font-size: 32px;
        margin-bottom: 20px;
        color: #3b82f6;
        text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .message {
        font-size: 18px;
        font-weight: 500;
        line-height: 1.6;
        margin-bottom: 30px;
        color: #93c5fd;
      }

      .session-info {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 30px;
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
      }

      .session-info h2 {
        font-family: "Cinzel Decorative", serif;
        font-size: 16px;
        color: #60a5fa;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .boss-name {
        font-family: "Cinzel Decorative", serif;
        font-size: 22px;
        color: #eab308;
        margin-bottom: 15px;
        font-weight: 700;
        text-shadow: 0 0 10px rgba(234, 179, 8, 0.4);
      }

      .time-remaining {
        font-family: "Cinzel Decorative", serif;
        font-size: 38px;
        color: #3b82f6;
        font-weight: 700;
        text-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
        font-variant-numeric: tabular-nums;
        letter-spacing: 2px;
      }

      .time-label {
        font-size: 14px;
        color: #64748b;
        margin-top: 5px;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 1px;
      }

      .button {
        background: transparent;
        color: #ef4444;
        border: 2px solid #ef4444;
        padding: 15px 30px;
        font-size: 16px;
        font-family: "Rajdhani", sans-serif;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.1);
        font-weight: 700;
      }

      .button:hover {
        background: rgba(239, 68, 68, 0.1);
        box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        text-shadow: 0 0 8px rgba(239, 68, 68, 0.8);
      }

      .button:focus {
        outline: 2px solid #ef4444;
        outline-offset: 4px;
      }

      .button:active {
        transform: scale(0.98);
      }

      .penalty-warning {
        font-size: 14px;
        color: #fca5a5;
        margin-top: 10px;
        font-style: italic;
      }

      .blocked-url {
        font-size: 14px;
        color: #6b7280;
        margin-top: 20px;
        word-break: break-all;
      }
    </style>
  </head>
  <body role="application">
    <div class="container" role="main" aria-labelledby="blocked-title">
      <div
        class="character"
        role="img"
        aria-label="Shadow Statue Guardian"
      ></div>

      <h1 id="blocked-title">
        THE SHADOW SEAL IS ACTIVE
      </h1>

      <p class="message">
        Your command is locked until the session ends.<br>
        Return to your quest and continue ascending.
      </p>

      <div
        class="session-info"
        role="region"
        aria-label="Current session information"
      >
        <h2>Current Quest</h2>
        <div class="boss-name" id="bossName" aria-live="polite">Loading...</div>
        <div
          class="time-remaining"
          id="timeRemaining"
          role="timer"
          aria-live="off"
          aria-atomic="true"
        >
          --:--
        </div>
        <div class="time-label">Time Remaining</div>
      </div>

      <button
        class="button"
        id="endSessionBtn"
        aria-label="End session early with 50% penalty applied"
      >
        End Session Early (Penalty Applied)
      </button>
      <div class="penalty-warning" role="alert" aria-live="polite">
        ⚠️ Ending early reduces rewards by 50%
      </div>

      <div class="blocked-url" id="blockedUrl" aria-label="Blocked URL"></div>
    </div>

    <script src="dist/blocked.js"></script>
  </body>
</html>
